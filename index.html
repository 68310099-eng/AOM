<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าเว็บของฉัน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* เพิ่ม CSS ตกแต่งเองเล็กน้อย */
        body { background-color: #f8f9fa; }
        .hero-section { 
            padding: 100px 0; 
            background: linear-gradient(45deg, #007bff, #6610f2);
            color: white;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <h1>ยินดีต้อนรับสู่โปรเจกต์ AOM</h1>
        <p>หน้าเว็บที่สร้างด้วย HTML และ CSS แบบง่ายๆ</p>
        <button class="btn btn-light btn-lg">เริ่มต้นใช้งาน</button>
    </div>

    <div class="container mt-5">
        <div class="row">
            <div class="col-md-4">
                <div class="card p-3">
                    <h3>หัวข้อที่ 1</h3>
                    <p>ใส่รายละเอียดของคุณตรงนี้ได้เลยครับ</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3">
                    <h3>หัวข้อที่ 2</h3>
                    <p>ลองปรับเปลี่ยนสีหรือข้อความดูนะ</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3">
                    <h3>หัวข้อที่ 3</h3>
                    <p>GitHub ทำให้การโฮสต์เว็บง่ายมาก!</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
